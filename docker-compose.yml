services:
  app:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - workspaces:/tmp/workspaces
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  workspaces:
  redis-data:
