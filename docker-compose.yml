services:
  # Orchestrator — webhook server + queue. Manages worker containers via Docker API.
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - CONFIG_PATH=/app/config.json
    ports:
      - "3000:3000"
    volumes:
      # Mount Docker socket so the orchestrator can create/destroy worker containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount config file (non-sensitive settings + env.KEY references for secrets)
      - ./config.json:/app/config.json:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Worker base image — pre-built so orchestrator can spin up containers instantly
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: claude-swe-worker:latest
    # This service is never actually "run" by compose — it just builds the image.
    # The orchestrator creates worker containers dynamically via Docker API.
    entrypoint: ["echo", "Worker image built. This container is not meant to run."]
    profiles:
      - build-only

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
